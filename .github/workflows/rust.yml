name: rust

on:
  [push, pull_request]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Build
      run: cargo build --all-targets
    - name: Test
      run: cargo test --all-features
    - name: Clippy
      run: cargo clippy --all-targets --all-features
    - name: Fmt
      run: cargo fmt -- --check
    - name: Doc
      run: cargo doc --no-deps
